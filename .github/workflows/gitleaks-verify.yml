---
name: Gitleaks Verification

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  verify-signature:
    name: Verify Gitleaks Signature
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify gitleaks signature on last commit
        run: |
          COMMIT_MSG=$(git log -1 --format=%B)

          GL_SIGN=$(echo "$COMMIT_MSG" | grep '^Gitleaks-Sign: ' | sed 's/^Gitleaks-Sign: //')
          GL_HASH=$(echo "$COMMIT_MSG" | grep '^Gitleaks-Hash: ' | sed 's/^Gitleaks-Hash: //')

          if [[ -z "$GL_SIGN" ]]; then
            echo "::error::Missing Gitleaks-Sign in commit message. Install gitleaks hooks: see hooks/pre-commit"
            exit 1
          fi

          if [[ -z "$GL_HASH" ]]; then
            echo "::error::Missing Gitleaks-Hash in commit message. Install gitleaks hooks: see hooks/pre-commit"
            exit 1
          fi

          # Verify hash integrity
          EXPECTED_HASH=$(echo -n "${GL_SIGN}" | sha256sum | awk '{print $1}')
          if [[ "$GL_HASH" != "$EXPECTED_HASH" ]]; then
            echo "::error::Gitleaks-Hash does not match Gitleaks-Sign."
            exit 1
          fi

          DECODED=$(echo "$GL_SIGN" | base64 -d 2>/dev/null)
          if [[ -z "$DECODED" ]]; then
            echo "::error::Gitleaks-Sign is not valid base64."
            exit 1
          fi

          # Validate format: version|timestamp|tree_hash
          if [[ ! "$DECODED" =~ ^.+\|[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}\|[0-9a-f]{40}$ ]]; then
            echo "::error::Gitleaks-Sign has invalid format. Expected 'version|timestamp|tree_hash'."
            exit 1
          fi

          VERSION=$(echo "$DECODED" | cut -d'|' -f1)
          TIMESTAMP=$(echo "$DECODED" | cut -d'|' -f2)
          SIGN_TREE=$(echo "$DECODED" | cut -d'|' -f3)

          # Verify tree hash matches this commit
          ACTUAL_TREE=$(git rev-parse HEAD^{tree})
          if [[ "$SIGN_TREE" != "$ACTUAL_TREE" ]]; then
            echo "::error::Tree hash mismatch. Signature was generated for a different commit content."
            echo "::error::  signature tree: $SIGN_TREE"
            echo "::error::  commit tree:    $ACTUAL_TREE"
            exit 1
          fi

          # Warn if signature is older than 7 days
          SIGN_EPOCH=$(date -d "$TIMESTAMP" +%s 2>/dev/null || echo 0)
          NOW_EPOCH=$(date +%s)
          AGE_DAYS=$(( (NOW_EPOCH - SIGN_EPOCH) / 86400 ))
          if [[ "$AGE_DAYS" -gt 7 ]]; then
            echo "::warning::Gitleaks signature is ${AGE_DAYS} days old."
          fi

          echo "Gitleaks signature valid: version=$VERSION, scanned=$TIMESTAMP, tree=$SIGN_TREE"

  gitleaks-scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GL_VERSION="8.30.1"
          GL_SHA256="551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          echo "${GL_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar xz -C /usr/local/bin gitleaks < /tmp/gitleaks.tar.gz

      - name: Run gitleaks on PR commits
        run: |
          gitleaks git --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" --no-banner --redact --exit-code 1

...
